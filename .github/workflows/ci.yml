name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ==========================================
      # LOGIN CORREGIDO (usando comando directo)
      # ==========================================
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u thelastwolfstanding --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ==========================================
      # 1. VALIDACIÓN CON docker/build (call: check)
      # ==========================================
      - name: Validate build configuration
        uses: docker/build-push-action@v7
        with:
          call: check

      # ==========================================
      # 2. CONSTRUCCIÓN Y PUSH CON docker/build
      # ==========================================
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: thelastwolfstanding/mi-app:latest

      # ==========================================
      # 3. VALIDACIÓN CON BAKE (docker/bake-action)
      # ==========================================
      - name: Validate build configuration with Bake
        uses: docker/bake-action@v6
        with:
          targets: build
          call: check

      # ==========================================
      # 4. CONSTRUCCIÓN Y PUSH CON BAKE
      # ==========================================
      - name: Build and push with Bake
        uses: docker/bake-action@v6
        with:
          targets: build
          push: true
