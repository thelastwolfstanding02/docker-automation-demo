name: Validación de Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-docker:
    runs-on: ubuntu-latest
    
    steps:
      # Paso 1: Clonar el repositorio 
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Paso 2: Configurar Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      # Paso 3: Validar la configuración de compilación
      - name: Validate build configuration
        uses: docker/build-push-action@v7
        with:
          call: check
          context: .
          file: ./Dockerfile
      
      # Paso 4: (Opcional) Si la validación pasa, construir y subir la imagen
      - name: Build and push (opcional)
        uses: docker/build-push-action@v7
        with:
          push: false  # Cambiar a true solo si quieres subir a Docker Hub
          tags: tu-usuario/mi-app:latest
