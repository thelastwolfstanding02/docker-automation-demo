name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: thelastwolfstanding/mi-app

      - name: Debug secret (verificar si el token llega)
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "✅ Token exists, length: ${#DOCKERHUB_TOKEN}"
            echo "First 4 chars: ${DOCKERHUB_TOKEN:0:4}"
            echo "Last 4 chars: ${DOCKERHUB_TOKEN: -4}"
          else
            echo "❌ Token is EMPTY! Check your secret configuration."
          fi
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: thelastwolfstanding
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run unit tests
        run: |
          npm install
          npm test

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
