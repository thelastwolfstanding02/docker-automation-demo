name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test Docker Hub API directly
        run: |
          RESPONSE=$(curl -s -X POST https://hub.docker.com/v2/users/login/ \
            -H "Content-Type: application/json" \
            -d '{"username":"thelastwolfstanding","password":"${{ secrets.DOCKERHUB_TOKEN }}"}')
          echo "API Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q "token"; then
            echo "✅ Token is VALID"
          else
            echo "❌ Token is INVALID or account issue"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: thelastwolfstanding
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run unit tests
        run: |
          npm install
          npm test

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: thelastwolfstanding/mi-app:latest
          provenance: true
          sbom: true
